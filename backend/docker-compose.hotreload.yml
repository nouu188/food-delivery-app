version: '3.8'

# Hot Reload Development Configuration
# Usage: docker-compose -f docker-compose.yml -f docker-compose.hotreload.yml up

services:
  api-gateway:
    build:
      context: .
      dockerfile: Dockerfile.dev
      target: development
      args:
        SERVICE_NAME: api-gateway
    command: yarn nx serve api-gateway --host=0.0.0.0
    environment:
      NODE_ENV: development
      HMR: "true"
    volumes:
      - .:/workspace:cached
      - /workspace/node_modules
      - /workspace/dist
    ports:
      - "3000:3000"
      - "9229:9229"  # Debug port

  auth-service:
