version: '3.8'

# Development override file - use with: docker-compose -f docker-compose.yml -f docker-compose.dev.yml up

services:
  postgres:
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: food_delivery_dev

  redis:
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes

  # For development, you may want to run services outside Docker
  # and only use PostgreSQL and Redis from Docker
  # Uncomment the services you want to disable in development:

  # api-gateway:
  #   profiles: ["disabled"]

  # auth-service:
  #   profiles: ["disabled"]

  # user-service:
  #   profiles: ["disabled"]

  # restaurant-service:
  #   profiles: ["disabled"]

  # order-service:
  #   profiles: ["disabled"]

  # payment-service:
  #   profiles: ["disabled"]

  # delivery-service:
  #   profiles: ["disabled"]

  # notification-service:
  #   profiles: ["disabled"]

  # review-service:
  #   profiles: ["disabled"]

  # promotion-service:
  #   profiles: ["disabled"]

  # PgAdmin for database management
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: food-delivery-pgadmin
    restart: unless-stopped
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - food-delivery-network
    depends_on:
      - postgres

  # Redis Commander for Redis management
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: food-delivery-redis-commander
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      REDIS_HOSTS: local:redis:6379
    networks:
      - food-delivery-network
    depends_on:
      - redis

volumes:
  pgadmin_data:
    driver: local
